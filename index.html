    <div
      class="LoginRegisterContainer"
      style="display: none; width: 100%; height: 100%"
    >
      <div id="blurlayer" style="width: inherit; padding: 20px 0">
        <div class="formContainer" id="registerForm" style="display: none">
          <form id="theRegForm">
            <p></p>
            <div
              style="
                height: 50px;
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <h2>Register</h2>
              <h2
                id="close"
                style="
                  font-weight: 500;
                  border-radius: 5px;
                  cursor: pointer;
                  padding: 0 8px 3px 8px;
                  background-color: #0001;
                "
                onclick="closeTab()"
              >
                x
              </h2>
            </div>

            <p style="color: red" class="errPlace" id="ErrRegister"></p>

            <label for="uname">*Name</label>
            <input
              type="text"
              id="uname"
              name="uname"
              placeholder="Alison Burgers"
            />

            <label for="email">*Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="alison@gmail.com"
            />

            <label for="mobile">*Mobile No</label>
            <input
              type="number"
              id="mobile"
              name="mobile"
              placeholder="9987456321"
            />

            <label for="pass">*Password</label>
            <input
              type="password"
              id="pass"
              name="pass"
              placeholder="Burgers@50"
            />

            <label for="repass">*Re-Enter Password</label>
            <input
              type="password"
              id="repass"
              name="repass"
              placeholder="Burgers@50"
            />

            <label for="pincode">*Pincode</label>
            <input
              type="number"
              id="pincode"
              name="pincode"
              placeholder="380006"
            />

            <label for="selectLocation">*Select Location on Map</label>
            <div id="map" style="width: 100%; height: 300px"></div>

            <label>*Address</label>
            <textarea
              id="address"
              placeholder="Select from map or type"
            ></textarea>

            <input type="hidden" id="lat" name="lat" />
            <input type="hidden" id="lng" name="lng" />

            <div>
              <button type="submit">Register</button>
              <button type="reset">Cancel</button>
            </div>

            <label
              for="pass"
              onclick="showLogin()"
              style="text-decoration: 1px solid underline; cursor: pointer"
              >Login Here</label
            >
            <p></p>
          </form>

          <script>
            const form = document.getElementById("theRegForm");
            const err = document.getElementById("ErrRegister");

            const uname = document.getElementById("uname");
            const email = document.getElementById("email");
            const mobile = document.getElementById("mobile");
            const pass = document.getElementById("pass");
            const repass = document.getElementById("repass");
            const pincode = document.getElementById("pincode");
            const address = document.getElementById("address");

            let map = L.map("map").setView([23.0225, 72.5714], 13);
            let marker;

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
              maxZoom: 19,
              attribution: "© OpenStreetMap",
            }).addTo(map);

            // setTimeout(() => map.invalidateSize(), 200);
            setTimeout(() => {
              map.invalidateSize();
            }, 2000);

            // click to select location
            map.on("click", async function (e) {
              const { lat, lng } = e.latlng;

              if (marker) map.removeLayer(marker);
              marker = L.marker([lat, lng]).addTo(map);

              document.getElementById("lat").value = lat;
              document.getElementById("lng").value = lng;

              const res = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
              );
              const data = await res.json();

              address.value = data.display_name;
            });

            // pincode → map location
            // const pincode = document.getElementById("pincode");

            pincode.addEventListener("input", async () => {
              if (pincode.value.length !== 6) return;

              const res = await fetch(
                `https://nominatim.openstreetmap.org/search?format=json&q=${pincode.value}`
              );
              const data = await res.json();

              if (data.length > 0) {
                const lat = data[0].lat;
                const lon = data[0].lon;

                map.setView([lat, lon], 15);

                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map);
              }
            });

            let lastPin = "";

            pincode.addEventListener("input", async () => {
              if (pincode.value.length !== 6 || pincode.value === lastPin)
                return;

              lastPin = pincode.value;

              const res = await fetch(
                `https://nominatim.openstreetmap.org/search?format=json&q=${pincode.value}`
              );
              const data = await res.json();

              if (data.length > 0) {
                const lat = data[0].lat;
                const lon = data[0].lon;

                map.setView([lat, lon], 15);

                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map);
              }
            });

            // submit
            form.addEventListener("submit", async (e) => {
              e.preventDefault();

              if (
                !uname.value ||
                !email.value ||
                !mobile.value ||
                !pass.value ||
                !repass.value
              ) {
                err.innerText = "All * fields required";
                return;
              }

              if (pass.value !== repass.value) {
                err.innerText = "Passwords not match";
                return;
              }

              const formData = new FormData(form);
              formData.append("address", address.value);

              const res = await fetch("./script/customer_register.php", {
                method: "POST",
                body: formData,
              });

              const result = await res.text();

              if (result === "success") {
                err.innerHTML = "<span style='color:green'>Registered</span>";
                form.reset();
              } else {
                err.innerText = result;
              }
            });
          </script>
        </div>

        <div class="formContainer" id="loginForm">
          <form id="theloginForm">
            <p></p>
            <div
              style="
                height: 50px;
                display: flex;
                justify-content: space-between;
                align-items: center;
              "
            >
              <h2>Login</h2>
              <h2
                id="close"
                style="
                  font-weight: 500;
                  border-radius: 5px;
                  cursor: pointer;
                  padding: 0 8px 3px 8px;
                  background-color: #0001;
                "
                onclick="closeTab()"
              >
                x
              </h2>
            </div>

            <p style="color: red" class="errPlace" id="Errlogin"></p>

            <label for="logEmail">*Email / Mobile</label>
            <input
              type="email"
              id="logEmail"
              name="logEmail"
              placeholder="alison@gmail.com"
            />

            <label for="logPass">*Password</label>
            <input
              type="password"
              id="logPass"
              name="logPass"
              placeholder="Burgers@50"
            />

            <div>
              <button type="submit">Login</button>
              <button type="reset">Cancel</button>
            </div>
            <label
              for="pass"
              onclick="showReg()"
              style="text-decoration: 1px solid underline; cursor: pointer"
              >Register Here</label
            >
            <p></p>
          </form>

          <script>
            const loginForm = document.querySelector("#theloginForm");
            const Errlogin = document.getElementById("Errlogin");

            loginForm.addEventListener("submit", async function (e) {
              e.preventDefault();

              const input = document.getElementById("logEmail").value.trim();
              const pass = document.getElementById("logPass").value;

              if (!input || !pass) {
                Errlogin.innerText = "All * fields are required";
                return;
              }

              const formData = new FormData();
              formData.append("logEmail", input);
              formData.append("logPass", pass);

              const res = await fetch("./script/customer_login.php", {
                method: "POST",
                body: formData,
              });

              const result = await res.text();

              if (result === "success") {
                Errlogin.innerHTML = `<p style="color:green;">Login Success</p>`;
                loginForm.reset();

                setTimeout(() => {
                  closeTab();
                  Errlogin.innerHTML = ``;
                  location.reload();
                }, 800);
              } else {
                Errlogin.innerHTML = `<p style="color:orange;">${result}</p>`;
              }
            });
          </script>
        </div>
      </div>
