    <div class="LoginRegisterContainer" style="display: none;width: 100%;height: 100%;">
        <div id="blurlayer" style="width: inherit;padding: 20px 0;">
            <div class="formContainer" id="registerForm" style="display: none">
                <form id="theRegForm">
                    <p></p>
                    <div style="height: 50px;display: flex;justify-content: space-between;align-items: center;">
                        <h2>Register</h2>
                        <h2 id="close"
                            style="font-weight: 500;border-radius: 5px;cursor: pointer;padding: 0 8px 3px 8px;background-color: #0001;"
                            onclick="closeTab(true)">
                            x
                        </h2>
                    </div>

                    <p style="color: red" class="errPlace" id="ErrRegister"></p>

                    <label for="sname">*Shop Name</label>
                    <input type="text" id="sname" name="sname" placeholder="MegaStore" />

                    <label for="vname">*Vendor Name</label>
                    <input type="text" id="vname" name="vname" placeholder="Jackson Tommy" />

                    <label for="vemail">*Email</label>
                    <input type="email" id="vemail" name="vemail" placeholder="JacksonMegaStore@gmail.com" />

                    <label for="vmobile">*Mobile No</label>
                    <input type="number" id="vmobile" name="vmobile" placeholder="9987456321" />

                    <label for="pass">*Password</label>
                    <input type="password" id="pass" name="pass" placeholder="MegaStore@50" />

                    <label for="repass">*Re-Enter Password</label>
                    <input type="password" id="repass" name="repass" placeholder="MegaStore@50" />

                    <label>*Address</label>
                    <textarea id="address" placeholder="Select from map or type"></textarea>

                    <div>
                        <button type="submit">Register</button>
                        <button type="reset">Clear</button>
                    </div>
                    <label for="pass" onclick="showLogin()"
                        style="text-decoration: 1px solid underline; cursor: pointer">Login Here</label>
                    <p></p>

                </form>
                <script>
                    theRegForm.addEventListener("submit", async function (e) {
                        e.preventDefault();

                        const sname = document.getElementById("sname").value.trim();
                        const vname = document.getElementById("vname").value.trim();
                        const email = document.getElementById("vemail").value.trim();
                        const mobile = document.getElementById("vmobile").value.trim();
                        const pass = document.getElementById("pass").value;
                        const repass = document.getElementById("repass").value;
                        const address = document.getElementById("address").value.trim();

                        const goToId = () => {
                            const element = document.getElementById("theRegForm");
                            if (element) {
                                element.scrollIntoView({ behavior: "smooth" });
                            }
                        };

                        if (!sname || !vname || !email || !mobile || !pass || !repass) {
                            ErrRegister.innerText = "All * fields are required";
                            goToId();
                            return;
                        }

                        if (vname.length < 3) {
                            ErrRegister.innerText = "Name must be at least 3 characters";
                            goToId();
                            return;
                        }

                        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
                        if (!email.match(emailPattern)) {
                            ErrRegister.innerText = "Enter valid email";
                            goToId();
                            return;
                        }

                        if (pass.length < 6) {
                            ErrRegister.innerText = "Password must be at least 6 characters";
                            goToId();
                            return;
                        }

                        // if (pass !== repass) {
                        //     ErrRegister.innerText = "Passwords do not match";
                        //     goToId();
                        //     return;
                        // }

                        // send to PHP
                        const formData = new FormData();
                        formData.append("sname", sname);
                        formData.append("vname", vname);
                        formData.append("vemail", email);
                        formData.append("vmobile", mobile);
                        formData.append("pass", pass);
                        formData.append("repass", repass);
                        formData.append("address", address);

                        
                        const res = await fetch("./script/register.php", {
                            method: "POST",
                            body: formData
                        });

                        console.log(res);
                        

                        const data = await res.text();
                        console.log(data);

                        if (data === "success") {
                            ErrRegister.innerHTML = `<p style="color:green;">Register Successful</p>`;

                            theRegForm.reset();
                            closeTab(true)

                            setTimeout(() => {
                                manageShop()
                                // document.getElementById("ShopkeeperOptionsBtns").style.display = "none";
                                document.getElementById("ShopkeeperOptionsBtns").innerHTML = "";
                                document.getElementById("ProductOptionsBtns").innerHTML =
                                    `
                                    <div class="optBtn hover">Add Shop Details</div>

                                `;
                            }, 500);

                        } else {
                            ErrRegister.innerHTML = `<p style="color:orange;">${data}</p>`;
                        }
                    });
                </script>
            </div>

            <div class="formContainer" id="loginForm">
                <form id="theloginForm">
                    <p></p>
                    <div style="
              height: 50px;
              display: flex;
              justify-content: space-between;
              align-items: center;
            ">
                        <h2>Login</h2>
                        <h2 id="close" style="
                font-weight: 500;
                border-radius: 5px;
                cursor: pointer;
                padding: 0 8px 3px 8px;
                background-color: #0001;
              " onclick="closeTab(true)">
                            x
                        </h2>
                    </div>

                    <p style="color: red" class="errPlace" id="Errlogin"></p>

                    <label for="logEmail">*Email / Mobile</label>
                    <input type="email" id="logEmail" name="logEmail" placeholder="JacksonMegaStore@gmail.com" />

                    <label for="logPass">*Password</label>
                    <input type="password" id="logPass" name="logPass" placeholder="MegaStore@50" />

                    <div>
                        <button type="submit">Login</button>
                        <button type="reset">Cancel</button>
                    </div>
                    <label for="pass" onclick="showReg()"
                        style="text-decoration: 1px solid underline; cursor: pointer">Register Here</label>
                    <p></p>
                </form>
                <script>
                    const loginForm = document.querySelector("#theloginForm");
                    const Errlogin = document.getElementById("Errlogin");

                    loginForm.addEventListener("submit", async function (e) {
                        e.preventDefault();

                        const email = document.getElementById("logEmail").value.trim();
                        const pass = document.getElementById("logPass").value;

                        if (!email || !pass) {
                            // alert("All fields are required");
                            Errlogin.innerText = "All * fields are required";
                            return;
                        }

                        // Email validation
                        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
                        if (!email.match(emailPattern)) {
                            // alert("Invalid email");
                            Errlogin.innerText = "Invalid email";
                            return;
                        }

                        const formData = new FormData();
                        formData.append("logEmail", email);
                        formData.append("logPass", pass);

                        const res = await fetch("./script/login.php", {
                            method: "POST",
                            body: formData
                        });

                        const result = await res.text();

                        if (result === "success") {
                            Errlogin.innerHTML = "<span style='color:green'>Login Successful</span>";

                            setTimeout(() => {
                                location.reload(); // reload to trigger auth check
                            }, 800);

                        } else {
                            Errlogin.innerText = result;
                        }


                    });
                </script>
            </div>
